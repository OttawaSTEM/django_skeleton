<div class="panel panel-default form-shadow">
    <div class="panel-heading">
        <h4 class="panel-title">
            <div data-parent="#{{ div.data_parent }}" href="#{{ div.css_id }}" style="font-weight: bold; font-style: italic;" id="accordion-header">{{ div.name }}</div>
        </h4>
    </div>
    <div id="{{ div.css_id }}" class="panel-collapse collapse{% if div.active %} in{% endif %}" >
        <div class="panel-body">
            {{ fields|safe }}
        </div>
    </div>
</div>
